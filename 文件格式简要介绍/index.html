<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>文件格式介绍</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <canvas id="starfield" aria-hidden="true"></canvas>
    <div class="scanlines" aria-hidden="true"></div>

    <main class="shell">
      <header class="hero">
        <div class="hero-copy">
          <h1>文件格式介绍</h1>
          <img class="atlas-mark" src="assets/format-atlas.svg" alt="格式星图视觉标识" />
        </div>
        <section class="status-grid" aria-label="项目统计">
          <div class="status-unit">
            <span id="totalCount">105</span>
            <small>格式条目</small>
          </div>
          <div class="status-unit">
            <span id="categoryCount">0</span>
            <small>分类模块</small>
          </div>
          <div class="status-unit">
            <span id="visibleCount">105</span>
            <small>当前匹配</small>
          </div>
        </section>
      </header>

      <section class="control-bar" aria-label="筛选控制">
        <label class="search-box">
          <span>检索</span>
          <input id="searchInput" type="search" placeholder="输入扩展名、类型或用途，例如 pdf / 图片 / 数据" autocomplete="off" />
        </label>
        <div class="mode-switch" role="group" aria-label="视图模式">
          <button class="mode-button active" type="button" data-density="comfortable">详细</button>
          <button class="mode-button" type="button" data-density="compact">简洁</button>
        </div>
      </section>

      <section class="quick-panel" aria-label="快速识别文件">
        <div class="quick-copy">
          <p class="eyebrow">QUICK IDENTIFY</p>
          <h2>快速搜索需要查询的文件</h2>
          <p>输入文件名或选择本地文件，界面会根据扩展名定位对应格式说明。</p>
        </div>
        <div class="quick-tools">
          <label class="file-query">
            <span>文件名</span>
            <input id="fileNameInput" type="text" placeholder="例如：report.pdf、photo.jpeg、archive.tar.gz" autocomplete="off" />
          </label>
          <label class="file-picker">
            <input id="filePicker" type="file" />
            <span>选择文件</span>
          </label>
          <button id="quickLookupButton" class="lookup-button" type="button">识别</button>
        </div>
        <p id="quickResult" class="quick-result">等待输入文件名。</p>
      </section>

      <section class="category-strip" id="categoryStrip" aria-label="文件格式分类"></section>

      <section class="workspace">
        <aside class="signal-panel" aria-label="分类星图">
          <div class="panel-title">分类星图</div>
          <div class="orbit-map" id="orbitMap" aria-hidden="true">
            <div class="orbit-core">FORMAT<br />CORE</div>
          </div>
        </aside>

        <section class="format-zone" aria-label="文件格式列表">
          <div class="zone-head">
            <div>
              <p class="eyebrow">SCAN RESULT</p>
              <h2 id="resultTitle">全部格式</h2>
            </div>
            <p id="resultHint">点击任意格式查看详细说明。</p>
          </div>
          <div class="format-grid" id="formatGrid"></div>
        </section>

        <aside class="detail-panel" aria-live="polite" aria-label="格式详情">
          <div class="panel-title">扫描详情</div>
          <div class="detail-code" id="detailExt">.pdf</div>
          <h2 id="detailName">版式文档</h2>
          <p id="detailDesc">便携式文档格式，强调跨平台显示一致性，常用于论文、合同和报告。</p>
          <div class="detail-meta">
            <span id="detailIndex">#007</span>
            <span id="detailType">文档</span>
          </div>
        </aside>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
